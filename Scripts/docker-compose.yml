version: '3.8'

services:
  redis:
    image: redis:7.2-alpine
    container_name: waf-redis
    ports:
      - "6379:6379"
    # Enable Append Only File persistence for durability
    command: redis-server --appendonly yes --loglevel warning
    volumes:
      - redis-data:/data
    networks:
      - waf-network

networks:
  waf-network:
    driver: bridge

volumes:
  redis-data: